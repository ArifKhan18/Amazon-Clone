<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="topicon.png">
    <title>Amazone</title>
</head>

<body>

    <header>
        <div class="navbar">
            <div class="nav-logo borrder">
                <div class="logo"></div>
            </div>
            <div class="nav-address borrder">
                <p class="add-one">Deliver to</p>
                <div class="add-icon">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="add-two">Bangladesh</p>
                </div>
            </div>
            <div class="nav-search">
                <select class="search-select">
                    <option>All</option>
                </select>
                <input class="search-input" type="search" placeholder="Search Amazon">
                <div class="search-icon">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>
            <div class="nav-singin borrder">
                <p><span>Hello, Sign in</span></p>
                <p class="nav-second">Account & Lists</p>
            </div>
            <div class="nav-return borrder">
                <p><span>Returns</span></p>
                <p class="nav-second">&orders</p>
            </div>
            <div class="nav-cart borrder">
                <i class="fa-solid fa-cart-arrow-down"></i>
                Cart
                <!-- <p class="nav-second">Cart</p> -->
            </div>
        </div>
        <div class="panel ">
            <div class="panel-all borrder">
                <i class="fa-solid fa-bars"></i>
                All
            </div>
            <div class="panel-ops ">
                <p class="borrder">Today's Deals</p>
                <p class="borrder">Customer Service</p>
                <p class="borrder">Gift Cards</p>
                <p class="borrder">Sell</p>
                <p class="borrder">Registry</p>
                <p class="borrder">Prime Video</p>
            </div>
            <div class="panel-deals borrder">
                Shop deals in Electronics
            </div>
        </div>
    </header>

    <div class="hero-section">
        <div class="hero-msg">
            <p>This is a simple Amazon clone built with HTML and CSS. <a href="https://www.amazon.com" target="_blank">Click here to go to amazon.com</a></p>
        </div>
    </div>
    <div class="shop-section">
        <div class="box1 box">box1</div>
        <div class="box2 box">box2</div>
        <div class="box3 box">box3</div>
        <div class="box4 box">box4</div>
    </div>
</body>
</html>
